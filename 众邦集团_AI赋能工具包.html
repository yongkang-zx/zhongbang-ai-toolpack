<title>众邦集团 · AI赋能工具包</title>

<style>
  :root{
    --bg-primary:#0E0C0A;
    --bg-secondary:#161310;
    --bg-card:#1C1914;
    --text-primary:#EDE7DF;
    --text-secondary:rgba(237,231,223,.65);
    --text-dim:rgba(237,231,223,.38);
    --gold:#D4A84B;
    --gold-dim:rgba(212,168,75,.25);
    --gold-faint:rgba(212,168,75,.10);
    --accent-green:#4CAF7C;
    --accent-blue:#5B9BD5;
    --sidebar-w:260px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--bg-primary);color:var(--text-primary);font-family:"Noto Sans SC",sans-serif;-webkit-font-smoothing:antialiased}

  /* 顶部栏 */
  .topbar{
    position:fixed;top:0;left:0;right:0;height:56px;z-index:10;
    background:var(--bg-primary);border-bottom:1px solid var(--gold-dim);
    display:flex;align-items:center;justify-content:space-between;padding:0 24px;
  }
  .topbar .logo-area{display:flex;align-items:center;gap:12px}
  .topbar .logo-area img{height:30px;width:auto}
  .topbar .logo-area .title{font-family:"Noto Serif SC",serif;font-weight:700;font-size:15px;letter-spacing:.08em;color:var(--gold)}
  .topbar .meta{font-size:12px;color:var(--text-dim);letter-spacing:.16em;text-align:right;line-height:1.45}
  .topbar .meta span{color:var(--gold);font-weight:600}
  .topbar .meta-sub{font-size:10px;color:var(--text-dim);letter-spacing:.1em;margin-top:1px;opacity:.7}

  /* 左侧导航 */
  .sidebar{
    position:fixed;top:56px;left:0;bottom:0;width:var(--sidebar-w);z-index:5;
    background:var(--bg-secondary);border-right:1px solid var(--gold-dim);
    overflow-y:auto;padding:16px 0;
  }
  .sidebar-section{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--text-dim);padding:16px 20px 4px}
  .sidebar-divider{height:1px;background:var(--gold-dim);margin:8px 20px 4px}
  .sidebar-item{
    display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:all .2s;
    font-size:13px;letter-spacing:.04em;color:var(--text-secondary);border-left:2px solid transparent;
    position:relative;
  }
  .sidebar-item:hover{background:var(--gold-faint);color:var(--text-primary)}
  .sidebar-item.active{background:var(--gold-faint);color:var(--gold);border-left:2px solid var(--gold);font-weight:600}
  .sidebar-item.active::after{content:"▸";position:absolute;right:12px;font-size:12px;color:var(--gold);opacity:.7}
  .sidebar-item .idx{font-family:"Noto Serif SC",serif;font-weight:700;font-size:11px;color:var(--gold);width:16px;text-align:center;flex-shrink:0}
  .sidebar-item .badge{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--gold-dim);color:var(--gold);margin-left:auto;flex-shrink:0}

  /* 右侧内容 */
  .main{
    position:fixed;top:56px;left:var(--sidebar-w);right:0;bottom:0;overflow-y:auto;
    padding:32px 40px 60px;
  }
  .panel{display:none}
  .panel.active{display:block}

  /* FDE 介绍条 */
  .fde-intro{
    background:var(--bg-card);border:1px solid var(--gold-dim);border-radius:6px;padding:24px 28px;margin-bottom:32px;
    display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;
  }
  .fde-intro .fde-def{
    flex:1 1 240px;min-width:200px;
  }
  .fde-intro .fde-def h3{font-family:"Noto Serif SC",serif;font-size:16px;color:var(--gold);margin-bottom:8px}
  .fde-intro .fde-def p{font-size:13px;line-height:1.7;color:var(--text-secondary)}
  .fde-intro .fde-cards{flex:1 1 380px;display:flex;gap:12px;flex-wrap:wrap}
  .fde-card{flex:1;min-width:100px;padding:14px 16px;background:rgba(255,255,255,.03);border-radius:4px;border:1px solid rgba(255,255,255,.06)}
  .fde-card .label{font-size:10px;letter-spacing:.16em;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
  .fde-card .value{font-family:"Noto Serif SC",serif;font-size:14px;font-weight:700;color:var(--text-primary)}
  .fde-card .link{font-size:11px;color:var(--accent-blue);text-decoration:underline;display:inline-block;margin-top:4px;cursor:pointer}
  .fde-card .link:hover{color:var(--gold)}
  .fde-duties{flex:1 1 100%;margin-top:6px;padding-top:16px;border-top:1px solid rgba(255,255,255,.06)}
  .fde-duties h4{font-size:12px;letter-spacing:.12em;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase}
  .fde-duties p{font-size:13px;line-height:1.7;color:var(--text-secondary)}

  .institution-header{margin-bottom:28px}
  .institution-header .eyebrow{font-size:11px;letter-spacing:.24em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
  .institution-header .ih-title{font-family:"Noto Serif SC",serif;font-weight:900;font-size:32px;color:var(--text-primary);letter-spacing:.02em}
  .institution-header .ih-stat{font-family:"Noto Serif SC",serif;font-weight:900;font-size:24px;color:var(--gold);margin-left:16px;letter-spacing:.02em;opacity:.85;flex-shrink:0}
  .institution-header .ih-title-row{display:flex;align-items:baseline;flex-wrap:wrap}
  .institution-header .ih-reps{font-size:13px;color:var(--text-secondary);margin-top:8px}
  .institution-header .ih-reps span{color:var(--gold)}
  .institution-header .ih-hook{font-family:"Noto Serif SC",serif;font-weight:400;font-size:18px;color:var(--gold);margin-top:14px;letter-spacing:.04em;line-height:1.5;padding-left:4px;border-left:2px solid var(--gold-dim)}
  .institution-header .ih-warn{font-size:11px;color:var(--text-dim);margin-top:10px;letter-spacing:.04em;opacity:.7}

  /* ===== 模块区块（新版设计布局） ===== */
  .module-grid{display:flex;flex-direction:column;gap:36px;max-width:1000px;margin:0 auto}
  .mod-block{scroll-margin-top:20px}
  .mod-head{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;padding-bottom:11px;border-bottom:1px solid var(--gold-dim)}
  .mod-head .mh-num{font-family:"Noto Serif SC",serif;font-weight:700;font-size:11px;letter-spacing:.18em;color:var(--gold);background:var(--gold-faint);border:1px solid var(--gold-dim);padding:3px 9px;border-radius:3px}
  .mod-head .mh-title{font-family:"Noto Serif SC",serif;font-weight:700;font-size:20px;color:var(--text-primary);letter-spacing:.04em}
  .mod-head .mh-sub{margin-left:auto;font-size:11px;color:var(--text-dim);letter-spacing:.18em;text-transform:uppercase}

  /* 核心痛点 */
  .pain-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .pain-card{position:relative;background:linear-gradient(135deg,rgba(224,103,74,.07),rgba(255,255,255,.005));border:1px solid rgba(224,103,74,.18);border-left:3px solid #E0674A;border-radius:6px;padding:16px 18px;overflow:hidden}
  .pain-card.feature{grid-column:1 / -1;background:linear-gradient(135deg,rgba(224,103,74,.12),rgba(255,255,255,.005))}
  .pain-card .pc-idx{font-family:"Noto Serif SC",serif;font-weight:900;font-size:11px;color:#E0846A;letter-spacing:.16em;margin-bottom:8px}
  .pain-card .pc-text{font-size:13px;line-height:1.75;color:var(--text-secondary)}
  .pain-card .pc-metric{display:inline-block;margin-top:10px;font-size:11px;color:#EBA88F;background:rgba(224,103,74,.14);padding:3px 10px;border-radius:3px;letter-spacing:.04em}
  .pain-card .pc-metric b{color:#F0B5A0;font-weight:700}

  /* AI 赋能场景 */
  .scene-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .scene-card{position:relative;background:var(--bg-card);border:1px solid rgba(255,255,255,.05);border-radius:6px;padding:18px 18px 18px 58px;transition:border-color .2s,transform .2s}
  .scene-card:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
  .scene-card.feature{grid-column:1 / -1;background:linear-gradient(135deg,var(--gold-faint),rgba(255,255,255,.005));border-color:var(--gold-dim)}
  .scene-card .sc-num{position:absolute;left:16px;top:18px;width:28px;height:28px;border-radius:50%;border:1px solid var(--gold-dim);color:var(--gold);font-family:"Noto Serif SC",serif;font-weight:700;font-size:13px;text-align:center;line-height:26px;background:var(--bg-primary)}
  .scene-card .sc-text{font-size:13px;line-height:1.75;color:var(--text-secondary)}
  .scene-card .sc-link{display:block;margin-top:9px;font-size:11px;color:var(--gold);letter-spacing:.05em;opacity:.9}
  .scene-card .sc-link::before{content:"→ 对应工具：";color:var(--text-dim);letter-spacing:.02em}

  /* 推荐 Skill 工具箱 */
  .skill-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .skill-card{display:flex;gap:14px;align-items:flex-start;background:var(--bg-card);border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:16px;transition:border-color .2s,transform .2s}

  .skill-card .sk-body{flex:1;min-width:0}
  .skill-card .sk-name{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:5px;letter-spacing:.02em}
  .skill-card .sk-desc{font-size:12px;line-height:1.65;color:var(--text-secondary)}
  .skill-card .sk-tag{display:inline-block;margin-top:9px;font-size:10px;letter-spacing:.12em;color:var(--text-dim);border:1px solid rgba(255,255,255,.1);padding:2px 8px;border-radius:3px}

  /* 建议行动指南 */
  .step-row{display:flex;gap:20px;position:relative}
  .step-row::before{content:"";position:absolute;top:12px;left:24px;right:24px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
  .step{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;flex:1;position:relative;z-index:1}
  .step .step-n{width:26px;height:26px;border-radius:50%;background:var(--bg-primary);border:2px solid var(--gold-dim);color:var(--gold);text-align:center;line-height:22px;font-size:11px;font-weight:700;flex-shrink:0}
  .step .step-body{font-size:12px;line-height:1.6;color:var(--text-secondary)}
  .step .step-body strong{color:var(--text-primary)}

  /* 通用卡片（compact 容器） */
  .module-card{background:var(--bg-card);border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:22px 20px}
  .module-card .mc-title{font-family:"Noto Serif SC",serif;font-weight:700;font-size:16px;color:var(--gold);margin-bottom:16px;letter-spacing:.04em}
  .institution-header .ih-tagline{font-size:11px;letter-spacing:.08em;color:var(--text-dim);margin-top:8px}

  /* 入场动画 */
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .reveal{animation:fadeUp .55s cubic-bezier(0.16,1,0.3,1) both}
  @media (prefers-reduced-motion: reduce){.reveal{animation:none}}

  /* ============ FDE 专属样式 ============ */
  .fde-wrap{max-width:1000px;margin:0 auto}
  .fde-hero{
    background:linear-gradient(135deg,rgba(212,168,75,.08),rgba(212,168,75,.02));
    border:1px solid var(--gold-dim);border-radius:6px;padding:32px 36px;margin-bottom:24px;
  }

  .fde-hero .fde-tag{display:inline-block;font-size:11px;padding:3px 10px;border:1px solid var(--gold-dim);border-radius:3px;color:var(--gold);margin-right:8px;margin-top:12px;letter-spacing:.12em}

  .fde-section{margin-bottom:32px}
  .fde-section h3{font-family:"Noto Serif SC",serif;font-weight:700;font-size:18px;color:var(--text-primary);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--gold-dim);display:flex;align-items:center;gap:10px}
  .fde-section h3 .num{font-family:"Noto Sans SC",sans-serif;font-size:11px;letter-spacing:.24em;color:var(--gold);background:var(--gold-faint);padding:3px 8px;border-radius:3px;font-weight:600}

  /* JD 图片 */
  .jd-frame{
    background:#fff;padding:18px;border-radius:6px;
    box-shadow:0 0 0 1px var(--gold),0 0 0 6px var(--paper),0 0 0 7px var(--gold-soft),0 20px 50px rgba(0,0,0,.5);

  .jd-caption{text-align:center;margin-top:14px;font-size:12px;color:var(--text-dim);letter-spacing:.16em}

  /* 薪资表 */
  .salary-table{width:100%;border-collapse:collapse;font-size:13px}
  .salary-table th{text-align:left;padding:12px 14px;background:var(--gold-faint);color:var(--gold);font-weight:600;letter-spacing:.08em;border-bottom:1px solid var(--gold-dim);font-size:12px;text-transform:uppercase}
  .salary-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05);color:var(--text-secondary);vertical-align:top}
  .salary-table tr:hover td{background:rgba(212,168,75,.04)}
  .salary-table .role{font-weight:600;color:var(--text-primary);min-width:130px}
  .salary-table .comp{font-family:"Noto Serif SC",serif;color:var(--gold);font-weight:700;min-width:130px}
  .salary-table .src{font-size:11px;color:var(--text-dim);min-width:140px}
  .salary-table a{color:var(--accent-blue);text-decoration:underline}
  .salary-table a:hover{color:var(--gold)}

  /* 案例网格 */
  .case-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
  .case-card{
    background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:5px;padding:16px 18px;
    transition:all .2s;
  }
  .case-card:hover{border-color:var(--gold-dim);transform:translateY(-1px)}
  .case-card .c-co{font-size:11px;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
  .case-card .c-co strong{color:var(--gold)}
  .case-card .c-result{font-family:"Noto Serif SC",serif;font-size:18px;font-weight:700;color:var(--gold);margin:6px 0 8px;letter-spacing:.02em}
  .case-card .c-desc{font-size:12px;line-height:1.6;color:var(--text-secondary);margin-bottom:10px}
  .case-card .c-link{font-size:11px;color:var(--accent-blue);text-decoration:underline;display:inline-block}
  .case-card .c-link:hover{color:var(--gold)}

  .fde-callout{
    background:rgba(212,168,75,.05);border-left:3px solid var(--gold);border-radius:0 4px 4px 0;padding:14px 18px;margin-top:18px;
    font-size:13px;line-height:1.7;color:var(--text-secondary);
  }
  .fde-callout strong{color:var(--gold)}

  /* FDE 结语 */
  .fde-closing{
    margin-top:28px;padding:22px 26px;border:1px solid var(--gold-dim);border-radius:6px;
    background:linear-gradient(135deg,rgba(212,168,75,.07),rgba(212,168,75,.01));position:relative;
  }
  .fde-closing .fc-label{font-size:11px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
  .fde-closing p{font-size:14px;line-height:1.95;color:var(--text-secondary);max-width:840px}
  .fde-closing strong{color:var(--gold);font-weight:600}
</style>
</head>

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  const items=INSTITUTIONS.map((ins,i)=>`
    <div class="sidebar-item${i===0?' active':''}" onclick="switchTab(${i})">
      <span class="idx">${ins.icon}</span>
      <span>${ins.name}</span>
      ${ins.badge?`<span class="badge">${ins.badge}</span>`:''}
    </div>
  `);
  items.splice(1,0,'<div class="sidebar-section">各机构赋能包</div><div class="sidebar-divider"></div>');
  sb.innerHTML=items.join('');
}

function extractMetric(t){
  const m=t.match(/[≥]?\d[\d\-–.%×+/ ]*?(分钟|小时|h|天|年|周|%|万|W|FTE|万小时|min)/);
  return m?m[0].replace(/\s+/g,''):'';
}
function skillTag(name){
  if(/生成|记录|录入|撰写|起草|策划|推荐|设计|摘要|纪要|整理/ .test(name)) return '生成';
  if(/预警|检查|合规|审查|审核|预审|风控/ .test(name)) return '风控';
  if(/分析|评估|对标|计分|追踪|看板|报告|汇总/ .test(name)) return '分析';
  if(/同步|会议|通知|推送|沟通|调度|排班|收集/ .test(name)) return '协同';
  return '工具';
}
function renderHeader(ins,sub){
  return `
<div class="institution-header">
  <div class="eyebrow">${ins.icon} ${ins.id.toUpperCase()} · ${sub}</div>
  <div class="ih-title-row"><div class="ih-title">${ins.name}</div><div class="ih-stat">${ins.stat}</div></div>
  <div class="ih-reps">参会代表：<span>${ins.reps}</span></div>
  <div class="ih-tagline">📍 ${ins.tagline}</div>
  <div class="ih-hook">${ins.hook}</div>
  <div class="ih-warn">${ins.warn||'如果不做：竞争对手可能在 6-12 个月内把这套工具变成他们的运营标准。'}</div>
</div>`;
}

function switchTab(i){
  document.querySelectorAll('.sidebar-item').forEach((el,j)=>el.classList.toggle('active',j===i));
  document.getElementById('main').innerHTML=`<div class="panel active">${renderPanel(INSTITUTIONS[i])}</div>`;
}

renderSidebar();
document.getElementById('main').innerHTML=`<div class="panel active">${renderPanel(INSTITUTIONS[0])}</div>`;
